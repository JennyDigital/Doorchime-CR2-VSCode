<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <title id="title">Audio Engine Flash Logo</title>
  <desc id="desc">Flashy neon logo for the Audio Engine with waveform, equalizer bars, and DSP chip motif.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b1a"/>
      <stop offset="100%" stop-color="#0b1731"/>
    </linearGradient>

    <linearGradient id="neonA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#2df598"/>
      <stop offset="100%" stop-color="#7cff3a"/>
    </linearGradient>

    <linearGradient id="neonB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9f1c"/>
      <stop offset="100%" stop-color="#ff3d81"/>
    </linearGradient>

    <filter id="glowSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#173253" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect x="8" y="8" width="1384" height="484" rx="28" fill="url(#bg)"/>
  <rect x="8" y="8" width="1384" height="484" rx="28" fill="url(#grid)"/>
  <rect x="8" y="8" width="1384" height="484" rx="28" fill="none" stroke="#22466c" stroke-width="2"/>

  <!-- Left icon panel -->
  <g transform="translate(70 70)">
    <rect x="0" y="0" width="360" height="360" rx="34" fill="#081c34" stroke="#2d5a87" stroke-width="4"/>

    <!-- DSP chip core -->
    <rect x="102" y="96" width="156" height="156" rx="18" fill="#102b4c" stroke="#4a88c2" stroke-width="3"/>
    <rect x="124" y="118" width="112" height="112" rx="12" fill="#0b2038" stroke="#2f78a6" stroke-width="2"/>

    <!-- Pins -->
    <g fill="#5f8fb5">
      <rect x="84" y="120" width="14" height="10" rx="2"/>
      <rect x="84" y="146" width="14" height="10" rx="2"/>
      <rect x="84" y="172" width="14" height="10" rx="2"/>
      <rect x="84" y="198" width="14" height="10" rx="2"/>

      <rect x="262" y="120" width="14" height="10" rx="2"/>
      <rect x="262" y="146" width="14" height="10" rx="2"/>
      <rect x="262" y="172" width="14" height="10" rx="2"/>
      <rect x="262" y="198" width="14" height="10" rx="2"/>

      <rect x="132" y="78" width="10" height="14" rx="2"/>
      <rect x="158" y="78" width="10" height="14" rx="2"/>
      <rect x="184" y="78" width="10" height="14" rx="2"/>
      <rect x="210" y="78" width="10" height="14" rx="2"/>

      <rect x="132" y="256" width="10" height="14" rx="2"/>
      <rect x="158" y="256" width="10" height="14" rx="2"/>
      <rect x="184" y="256" width="10" height="14" rx="2"/>
      <rect x="210" y="256" width="10" height="14" rx="2"/>
    </g>

    <!-- Waveform inside chip -->
    <path d="M136 176 C148 150, 160 150, 172 176 C184 202, 196 202, 208 176 C220 150, 232 150, 244 176"
          fill="none" stroke="url(#neonA)" stroke-width="5" stroke-linecap="round" filter="url(#glowSoft)"/>

    <!-- Equalizer bars -->
    <g transform="translate(38 290)" fill="url(#neonB)" filter="url(#glowSoft)">
      <rect x="0" y="26" width="16" height="28" rx="4"/>
      <rect x="24" y="12" width="16" height="42" rx="4"/>
      <rect x="48" y="0" width="16" height="54" rx="4"/>
      <rect x="72" y="18" width="16" height="36" rx="4"/>
      <rect x="96" y="8" width="16" height="46" rx="4"/>
      <rect x="120" y="20" width="16" height="34" rx="4"/>
      <rect x="144" y="6" width="16" height="48" rx="4"/>
      <rect x="168" y="16" width="16" height="38" rx="4"/>
      <rect x="192" y="2" width="16" height="52" rx="4"/>
      <rect x="216" y="22" width="16" height="32" rx="4"/>
      <rect x="240" y="10" width="16" height="44" rx="4"/>
      <rect x="264" y="26" width="16" height="28" rx="4"/>
    </g>

    <!-- Arc accents -->
    <path d="M288 132 C332 150, 332 198, 288 216" fill="none" stroke="#ff8f5a" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <path d="M304 118 C356 144, 356 204, 304 230" fill="none" stroke="#ffce47" stroke-width="6" stroke-linecap="round" opacity="0.78"/>
  </g>

  <!-- Right text block -->
  <g transform="translate(490 132)">
    <text x="0" y="0" fill="#e9f4ff" font-size="76" font-weight="800" font-family="'Trebuchet MS', 'Verdana', sans-serif" letter-spacing="1.5">AUDIO ENGINE</text>
    <text x="2" y="72" fill="url(#neonA)" font-size="48" font-weight="700" font-family="'Trebuchet MS', 'Verdana', sans-serif" letter-spacing="3">DSP CORE</text>

    <rect x="0" y="98" width="760" height="2" fill="#2a537b"/>

    <!-- Decorative waveform ribbon -->
    <path d="M0 146 C60 114, 120 114, 180 146 C240 178, 300 178, 360 146 C420 114, 480 114, 540 146 C600 178, 660 178, 720 146"
          fill="none" stroke="url(#neonB)" stroke-width="6" stroke-linecap="round" filter="url(#glowSoft)"/>

    <text x="0" y="206" fill="#9bc2dd" font-size="22" font-weight="600" font-family="'Trebuchet MS', 'Verdana', sans-serif" letter-spacing="1.1">REAL-TIME FILTERING • LOW LATENCY DMA STREAMING • 8/16-BIT AUDIO</text>
  </g>
</svg>
