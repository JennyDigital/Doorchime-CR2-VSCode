<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Doorchime CR2 Logo</title>
  <desc id="desc">A stylized door chime logo for the Doorchime CR2 audio engine project.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="1184" height="404" rx="28" fill="url(#bgGrad)"/>
  <rect x="8" y="8" width="1184" height="404" rx="28" fill="none" stroke="#284b63" stroke-width="2"/>

  <!-- Icon block -->
  <g transform="translate(70 70)">
    <!-- Outer door frame -->
    <rect x="0" y="0" width="280" height="280" rx="28" fill="#0b2336" stroke="#2a5f7a" stroke-width="5"/>

    <!-- Door panel -->
    <rect x="42" y="32" width="118" height="216" rx="14" fill="#12354d" stroke="#4f8fb0" stroke-width="3"/>
    <circle cx="142" cy="142" r="8" fill="#f6c453"/>

    <!-- Bell/chime -->
    <path d="M202 164 C202 124, 234 100, 234 76 C234 54, 250 44, 264 44 C278 44, 294 54, 294 76 C294 100, 326 124, 326 164 Z"
          transform="translate(-44 0)"
          fill="url(#accentGrad)"
          filter="url(#softGlow)"/>
    <rect x="210" y="166" width="44" height="10" rx="5" fill="#77e8c8"/>
    <circle cx="232" cy="184" r="9" fill="#f6c453"/>

    <!-- Sound waves -->
    <path d="M262 116 C280 130, 280 152, 262 166" fill="none" stroke="url(#warmGrad)" stroke-width="7" stroke-linecap="round"/>
    <path d="M278 102 C306 124, 306 158, 278 180" fill="none" stroke="url(#warmGrad)" stroke-width="7" stroke-linecap="round" opacity="0.92"/>

    <!-- Microcontroller pins motif -->
    <g fill="#4b6f88">
      <rect x="10" y="286" width="16" height="10" rx="2"/>
      <rect x="38" y="286" width="16" height="10" rx="2"/>
      <rect x="66" y="286" width="16" height="10" rx="2"/>
      <rect x="94" y="286" width="16" height="10" rx="2"/>
      <rect x="122" y="286" width="16" height="10" rx="2"/>
      <rect x="150" y="286" width="16" height="10" rx="2"/>
      <rect x="178" y="286" width="16" height="10" rx="2"/>
      <rect x="206" y="286" width="16" height="10" rx="2"/>
      <rect x="234" y="286" width="16" height="10" rx="2"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(410 130)">
    <text x="0" y="0" fill="#e8f1f7" font-size="72" font-weight="700" font-family="'Trebuchet MS', 'Verdana', sans-serif" letter-spacing="1.2">DOORCHIME</text>
    <text x="4" y="78" fill="url(#accentGrad)" font-size="62" font-weight="700" font-family="'Trebuchet MS', 'Verdana', sans-serif" letter-spacing="2">CR2</text>

    <rect x="0" y="104" width="530" height="2" fill="#2f5b73"/>
    <text x="0" y="148" fill="#9dc4d8" font-size="24" font-weight="600" font-family="'Trebuchet MS', 'Verdana', sans-serif" letter-spacing="1.6">STM32 AUDIO ENGINE</text>

    <text x="0" y="192" fill="#7aa3b8" font-size="20" font-weight="500" font-family="'Trebuchet MS', 'Verdana', sans-serif" letter-spacing="0.9">I2S • DSP FILTER CHAIN • 8/16-BIT PLAYBACK</text>
  </g>
</svg>
